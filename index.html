<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laporan Harian — BSI Pro</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:#F7F8FA;color:#1C1E26;font-size:14px;}

    /* ===== LOGIN ===== */
    #loginScreen{
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:#F7F8FA;
    }
    .login-wrap{width:100%;max-width:360px;padding:16px;}
    .login-logo{
      width:48px;height:48px;border-radius:12px;margin:0 auto 16px;
      background:#1B3A6B;display:grid;place-items:center;
      font-weight:700;font-size:18px;color:#fff;
    }
    .login-wrap h2{text-align:center;font-size:18px;font-weight:700;margin-bottom:4px;}
    .login-wrap p{text-align:center;font-size:13px;color:#6B7280;margin-bottom:24px;}
    .login-box{background:#fff;border:1px solid #E5E7EB;border-radius:14px;padding:24px;}
    .fld{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
    .fld label{font-size:12px;font-weight:600;color:#374151;letter-spacing:.3px;}
    .fld input{
      border:1px solid #E5E7EB;border-radius:9px;padding:10px 12px;
      font-family:inherit;font-size:14px;color:#1C1E26;transition:.15s;
    }
    .fld input:focus{outline:none;border-color:#1B3A6B;box-shadow:0 0 0 3px rgba(27,58,107,.08);}
    .btn-login{
      width:100%;background:#1B3A6B;color:#fff;border:none;border-radius:9px;
      padding:11px;font-family:inherit;font-weight:600;font-size:14px;cursor:pointer;
      transition:.15s;margin-top:4px;
    }
    .btn-login:hover{background:#153060;}
    .btn-login:disabled{opacity:.6;cursor:not-allowed;}
    .err{background:#FEF2F2;color:#DC2626;border-radius:8px;padding:9px 12px;
      font-size:13px;margin-top:10px;display:none;text-align:center;}
    .load{text-align:center;color:#6B7280;font-size:13px;margin-top:10px;display:none;}

    /* ===== APP ===== */
    #app{display:none;min-height:100vh;}

    /* TOPBAR */
    .topbar{
      background:#fff;border-bottom:1px solid #E5E7EB;
      padding:0 20px;height:56px;
      display:flex;align-items:center;gap:12px;
      position:sticky;top:0;z-index:100;
    }
    .t-logo{
      width:32px;height:32px;border-radius:8px;background:#1B3A6B;
      display:grid;place-items:center;font-weight:700;font-size:13px;color:#fff;flex:0 0 auto;
    }
    .t-title{font-weight:600;font-size:15px;color:#1C1E26;}
    .t-sep{width:1px;height:20px;background:#E5E7EB;margin:0 4px;}
    .t-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
    .t-input{
      border:1px solid #E5E7EB;border-radius:7px;padding:5px 9px;
      font-family:inherit;font-size:13px;color:#1C1E26;background:#F9FAFB;
    }
    .t-input:focus{outline:none;border-color:#1B3A6B;}
    .t-user{font-size:12px;color:#6B7280;display:flex;align-items:center;gap:5px;}
    .t-actions{margin-left:auto;display:flex;gap:6px;}
    .btn-sm{
      border:1px solid #E5E7EB;background:#fff;border-radius:7px;
      padding:6px 11px;font-family:inherit;font-size:12px;font-weight:500;
      cursor:pointer;color:#374151;transition:.15s;display:flex;align-items:center;gap:5px;
    }
    .btn-sm:hover{background:#F3F4F6;}
    .btn-sm.primary{background:#1B3A6B;color:#fff;border-color:#1B3A6B;}
    .btn-sm.primary:hover{background:#153060;}
    .btn-sm.danger{color:#DC2626;border-color:#FECACA;}
    .btn-sm.danger:hover{background:#FEF2F2;}

    /* SYNC */
    .sync{
      margin:12px 20px 0;padding:8px 12px;border-radius:8px;
      font-size:12px;font-weight:500;display:flex;align-items:center;gap:7px;
      background:#F0FDF4;color:#15803D;border:1px solid #BBF7D0;
    }
    .sync.off{background:#FFFBEB;color:#92400E;border-color:#FDE68A;}
    .sync-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex:0 0 auto;}
    .sync.off .sync-dot{animation:blink 1s infinite;}
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}

    /* KPI */
    .kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;padding:14px 20px 0;}
    .kpi{background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:12px 14px;}
    .kpi-label{font-size:11px;color:#6B7280;font-weight:500;text-transform:uppercase;letter-spacing:.4px;}
    .kpi-val{font-size:24px;font-weight:700;line-height:1;margin:6px 0 3px;color:#1C1E26;}
    .kpi-sub{font-size:11px;color:#9CA3AF;}

    /* TABS */
    .tab-row{display:flex;gap:4px;flex-wrap:wrap;padding:14px 20px 0;}
    .tab{
      padding:7px 12px;border-radius:7px;border:1px solid #E5E7EB;
      background:#fff;font-family:inherit;font-size:12px;font-weight:500;
      color:#6B7280;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:6px;
    }
    .tab:hover{border-color:#1B3A6B;color:#1B3A6B;}
    .tab.active{background:#1B3A6B;color:#fff;border-color:#1B3A6B;}
    .tab .n{
      background:#F3F4F6;color:#6B7280;border-radius:20px;
      padding:1px 6px;font-size:11px;font-weight:600;
    }
    .tab.active .n{background:rgba(255,255,255,.2);color:#fff;}

    /* PANEL */
    .panel{display:none;margin:12px 20px 40px;background:#fff;border:1px solid #E5E7EB;border-radius:12px;overflow:hidden;}
    .panel.active{display:block;animation:up .2s ease;}
    @keyframes up{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

    .panel-hd{
      padding:14px 16px;border-bottom:1px solid #F3F4F6;
      display:flex;align-items:center;gap:10px;background:#FAFAFA;
    }
    .panel-hd .ic{font-size:18px;}
    .panel-hd h2{font-size:14px;font-weight:600;margin:0;}
    .panel-hd p{font-size:12px;color:#6B7280;margin:1px 0 0;}

    /* FORM */
    .form-area{
      display:grid;gap:10px;padding:14px 16px;
      grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
      align-items:end;border-bottom:1px solid #F3F4F6;
    }
    .f{display:flex;flex-direction:column;gap:4px;}
    .f label{font-size:11px;font-weight:600;color:#6B7280;text-transform:uppercase;letter-spacing:.3px;}
    .f input,.f select{
      border:1px solid #E5E7EB;border-radius:7px;padding:8px 10px;
      font-family:inherit;font-size:13px;color:#1C1E26;background:#fff;width:100%;
    }
    .f input:focus,.f select:focus{outline:none;border-color:#1B3A6B;box-shadow:0 0 0 3px rgba(27,58,107,.07);}
    .f.wide{grid-column:1/-1;}
    .form-footer{grid-column:1/-1;display:flex;justify-content:flex-end;}
    .btn-add{
      background:#1B3A6B;color:#fff;border:none;border-radius:7px;
      padding:8px 16px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:.15s;
    }
    .btn-add:hover{background:#153060;}

    /* TABLE */
    .tbl-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;font-size:13px;min-width:500px;}
    thead th{
      text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;
      letter-spacing:.5px;color:#9CA3AF;padding:10px 14px;
      border-bottom:1px solid #F3F4F6;white-space:nowrap;background:#FAFAFA;
    }
    tbody td{padding:10px 14px;border-bottom:1px solid #F9FAFB;color:#374151;}
    tbody tr:last-child td{border-bottom:none;}
    tbody tr:hover{background:#FAFAFA;}
    .num{font-variant-numeric:tabular-nums;font-weight:600;}
    .empty{padding:32px;text-align:center;color:#9CA3AF;font-size:13px;}

    /* PILLS */
    .pill{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap;}
    .pg{background:#DCFCE7;color:#15803D;}
    .pa{background:#FEF9C3;color:#92400E;}
    .pr{background:#FEE2E2;color:#DC2626;}
    .pb{background:#DBEAFE;color:#1D4ED8;}
    .pn{background:#F3F4F6;color:#6B7280;}

    .del{
      border:none;background:transparent;color:#D1D5DB;
      width:26px;height:26px;border-radius:6px;cursor:pointer;font-size:13px;
      transition:.15s;display:grid;place-items:center;
    }
    .del:hover{background:#FEE2E2;color:#DC2626;}

    .foot{padding:20px;text-align:center;color:#9CA3AF;font-size:12px;}

    @media(max-width:600px){
      .topbar{flex-wrap:wrap;height:auto;padding:10px 14px;gap:8px;}
      .t-meta{width:100%;}
      .kpi-row{grid-template-columns:repeat(2,1fr);}
    }

    @media print{
      #loginScreen{display:none!important;}
      #app{display:block!important;}
      .topbar{border-bottom:2px solid #1B3A6B;}
      .tab-row,.form-area,.t-actions,.del,.sync,.foot{display:none!important;}
      .panel{display:block!important;margin:8px;page-break-inside:avoid;}
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-wrap">
    <div class="login-logo">BSI</div>
    <h2>BSI Pro Dashboard</h2>
    <p>Laporan Harian Operasional<br>PT. Bangun Sinar Indonesia</p>
    <div class="login-box">
      <div class="fld">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="email@bsipro.com" autocomplete="email">
      </div>
      <div class="fld">
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-login" id="btnLogin">Masuk</button>
      <div class="err" id="loginErr"></div>
      <div class="load" id="loginLoad">Mohon tunggu...</div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="t-logo">BSI</div>
    <span class="t-title">Laporan Harian</span>
    <div class="t-sep"></div>
    <div class="t-meta">
      <input type="date" class="t-input" id="tgl">
      <input type="text" class="t-input" id="admin" placeholder="Admin / PIC" style="min-width:130px;">
      <input type="text" class="t-input" id="area" placeholder="Area / Proyek" style="min-width:130px;">
    </div>
    <div class="t-user">👤 <span id="userEmail"></span></div>
    <div class="t-actions">
      <button class="btn-sm" id="btnCetak">🖨 Cetak</button>
      <button class="btn-sm primary" id="btnCsv">⬇ CSV</button>
      <button class="btn-sm danger" id="btnLogout">Keluar</button>
    </div>
  </div>

  <!-- SYNC -->
  <div class="sync off" id="syncBar">
    <span class="sync-dot"></span>
    <span id="syncText">Menghubungkan...</span>
  </div>

  <!-- KPI -->
  <div class="kpi-row" id="kpis"></div>

  <!-- TABS -->
  <div class="tab-row" id="tabs"></div>

  <!-- PANELS -->
  <div id="panels"></div>

  <div class="foot">PT. Bangun Sinar Indonesia — BSI Pro · Data tersinkron real-time</div>
</div>

<script>
(function(){
"use strict";

/* ── FIREBASE CONFIG ── */
const firebaseConfig = {
  apiKey:            "AIzaSyCq7KGXAefUfsC1Vf4a1y63Ptfw6zpFx44",
  authDomain:        "bsi-dashboard-c1bcc.firebaseapp.com",
  projectId:         "bsi-dashboard-c1bcc",
  storageBucket:     "bsi-dashboard-c1bcc.firebasestorage.app",
  messagingSenderId: "953786612796",
  appId:             "1:953786612796:web:d58d74bda7ec0811065739",
  databaseURL:       "https://bsi-dashboard-c1bcc-default-rtdb.asia-southeast1.firebasedatabase.app/"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.database();

/* ── MODULES ── */
const MODULES = [
  { key:'operasional', icon:'📋', label:'Operasional', desc:'Aktivitas operasional rutin harian',
    fields:[
      {n:'waktu',    l:'Waktu',      t:'time',   w:'s'},
      {n:'kegiatan', l:'Kegiatan',   t:'text',   w:'l', ph:'Uraian kegiatan'},
      {n:'lokasi',   l:'Lokasi',     t:'text',   w:'m'},
      {n:'pic',      l:'PIC',        t:'text',   w:'s'},
      {n:'status',   l:'Status',     t:'select', opt:['Selesai','Proses','Tertunda']},
      {n:'ket',      l:'Keterangan', t:'text',   w:'l'},
    ]},
  { key:'kunjungan', icon:'📍', label:'Kunjungan', desc:'Kunjungan & inspeksi area/site',
    fields:[
      {n:'waktu',    l:'Waktu',          t:'time',   w:'s'},
      {n:'lokasi',   l:'Lokasi',         t:'text',   w:'m'},
      {n:'pic',      l:'Petugas',        t:'text',   w:'s'},
      {n:'temuan',   l:'Temuan',         t:'text',   w:'l'},
      {n:'tindakan', l:'Tindak Lanjut',  t:'text',   w:'l'},
      {n:'status',   l:'Kondisi',        t:'select', opt:['Baik','Perlu Perbaikan','Kritis']},
    ]},
  { key:'mesin', icon:'🔧', label:'Mesin', desc:'Pemeliharaan & perbaikan peralatan',
    fields:[
      {n:'mesin',     l:'Mesin / Alat',   t:'text',   w:'m'},
      {n:'lokasi',    l:'Lokasi',         t:'text',   w:'s'},
      {n:'kerusakan', l:'Kerusakan',      t:'text',   w:'l'},
      {n:'tindakan',  l:'Tindakan',       t:'text',   w:'l'},
      {n:'teknisi',   l:'Teknisi',        t:'text',   w:'s'},
      {n:'status',    l:'Status',         t:'select', opt:['Selesai','Proses','Menunggu Sparepart','Pending']},
    ]},
  { key:'inventaris', icon:'📦', label:'Inventaris', desc:'Mutasi stok barang & material',
    fields:[
      {n:'item',     l:'Item',      t:'text',   w:'m'},
      {n:'kategori', l:'Kategori',  t:'select', opt:['Chemical','Consumable','Alat','Spare Part','APD','Lainnya']},
      {n:'masuk',    l:'Masuk',     t:'number', w:'s'},
      {n:'keluar',   l:'Keluar',    t:'number', w:'s'},
      {n:'sisa',     l:'Sisa',      t:'number', w:'s'},
      {n:'satuan',   l:'Satuan',    t:'text',   w:'s', ph:'pcs/ltr'},
    ]},
  { key:'absensi', icon:'🕒', label:'Absensi', desc:'Kehadiran personil harian',
    fields:[
      {n:'nama',    l:'Nama',       t:'text',   w:'m'},
      {n:'jabatan', l:'Jabatan',    t:'text',   w:'m'},
      {n:'masuk',   l:'Jam Masuk',  t:'time',   w:'s'},
      {n:'pulang',  l:'Jam Pulang', t:'time',   w:'s'},
      {n:'status',  l:'Status',     t:'select', opt:['Hadir','Terlambat','Izin','Sakit','Cuti','Alpha']},
      {n:'ket',     l:'Ket',        t:'text',   w:'m'},
    ]},
  { key:'komplain', icon:'⚠️', label:'Komplain', desc:'Keluhan klien / pengguna area',
    fields:[
      {n:'waktu',      l:'Waktu',       t:'time',   w:'s'},
      {n:'pelapor',    l:'Pelapor',     t:'text',   w:'m'},
      {n:'kategori',   l:'Kategori',    t:'select', opt:['Kebersihan','Maintenance','SDM','Keamanan','Lainnya']},
      {n:'deskripsi',  l:'Deskripsi',   t:'text',   w:'l'},
      {n:'penanganan', l:'Penanganan',  t:'text',   w:'l'},
      {n:'status',     l:'Status',      t:'select', opt:['Open','Proses','Closed']},
    ]},
  { key:'nonreguler', icon:'✨', label:'Non Reguler', desc:'Aktivitas insidental / luar jadwal',
    fields:[
      {n:'waktu',    l:'Waktu',      t:'time', w:'s'},
      {n:'kegiatan', l:'Kegiatan',   t:'text', w:'l'},
      {n:'lokasi',   l:'Lokasi',     t:'text', w:'m'},
      {n:'pic',      l:'PIC',        t:'text', w:'s'},
      {n:'ket',      l:'Keterangan', t:'text', w:'l'},
    ]},
  { key:'rencana', icon:'🎯', label:'Rencana Kerja', desc:'Rencana tindak lanjut & target',
    fields:[
      {n:'target',    l:'Tgl Target',  t:'date',   w:'s'},
      {n:'kegiatan',  l:'Kegiatan',    t:'text',   w:'l'},
      {n:'pic',       l:'PIC',         t:'text',   w:'s'},
      {n:'prioritas', l:'Prioritas',   t:'select', opt:['Tinggi','Sedang','Rendah']},
      {n:'status',    l:'Status',      t:'select', opt:['Belum Mulai','Berjalan','Selesai']},
      {n:'ket',       l:'Keterangan',  t:'text',   w:'l'},
    ]},
];

const PILL = {
  'Selesai':'pg','Closed':'pg','Baik':'pg','Hadir':'pg','Berjalan':'pb',
  'Proses':'pa','Terlambat':'pa','Perlu Perbaikan':'pa','Menunggu Sparepart':'pa','Open':'pa','Belum Mulai':'pn',
  'Tertunda':'pr','Pending':'pr','Kritis':'pr','Alpha':'pr','Tinggi':'pr',
  'Izin':'pb','Cuti':'pb','Sakit':'pa','Sedang':'pa','Rendah':'pn','Lainnya':'pn',
};

/* ── STATE ── */
let DATA = {}, META = {admin:'',area:''};
let activeTab  = MODULES[0].key;
let currentDate = new Date().toISOString().slice(0,10);
let unsub = null;

const el  = id => document.getElementById(id);
const esc = s  => String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* ── AUTH ── */
auth.onAuthStateChanged(user => {
  if(user){
    el('loginScreen').style.display = 'none';
    el('app').style.display = 'block';
    el('userEmail').textContent = user.email;
    initApp();
  } else {
    el('loginScreen').style.display = 'flex';
    el('app').style.display = 'none';
    if(unsub){ unsub(); unsub=null; }
  }
});

el('btnLogin').onclick = async () => {
  const email = el('loginEmail').value.trim();
  const pass  = el('loginPass').value;
  if(!email||!pass){ showErr('Email dan password wajib diisi.'); return; }
  el('loginErr').style.display = 'none';
  el('loginLoad').style.display = 'block';
  el('btnLogin').disabled = true;
  try{ await auth.signInWithEmailAndPassword(email, pass); }
  catch(e){ showErr(errMsg(e.code)); el('loginLoad').style.display='none'; el('btnLogin').disabled=false; }
};
el('loginPass').addEventListener('keydown', e => { if(e.key==='Enter') el('btnLogin').click(); });
el('btnLogout').onclick = () => { if(confirm('Yakin keluar?')) auth.signOut(); };

function showErr(m){ el('loginErr').textContent=m; el('loginErr').style.display='block'; }
function errMsg(c){
  return {'auth/user-not-found':'Email tidak ditemukan.','auth/wrong-password':'Password salah.',
    'auth/invalid-email':'Format email tidak valid.','auth/invalid-credential':'Email atau password salah.'}[c]||'Login gagal.';
}

/* ── DATABASE ── */
const ref = d => db.ref('laporan/'+d.replace(/-/g,'_'));

function listenDay(d){
  if(unsub) unsub();
  setSyncing();
  const r = ref(d);
  const h = snap => {
    const o = snap.val();
    DATA = o?.data||{}; META = o?.meta||{admin:'',area:''};
    MODULES.forEach(m=>{ if(!Array.isArray(DATA[m.key])) DATA[m.key]=[]; });
    el('admin').value = META.admin||'';
    el('area').value  = META.area||'';
    setSynced(); render();
  };
  r.on('value', h, err => {
    el('syncBar').className='sync off';
    el('syncText').textContent='⚠️ Gagal terhubung. Periksa koneksi.';
    console.error(err);
  });
  unsub = () => r.off('value', h);
}

async function save(){
  setSyncing();
  try{ await ref(currentDate).set({data:DATA, meta:META}); }
  catch(e){ alert('Gagal menyimpan. Periksa koneksi.'); console.error(e); }
}

function setSyncing(){ el('syncBar').className='sync off'; el('syncText').textContent='Menyinkronkan...'; }
function setSynced(){
  el('syncBar').className='sync';
  el('syncText').textContent='Tersinkron · '+new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
}

/* ── RENDER ── */
function render(){ buildKpi(); buildTabs(); buildPanels(); }

function buildKpi(){
  const c = k => DATA[k]||[];
  const abs = c('absensi');
  const hadir = abs.filter(r=>['Hadir','Terlambat'].includes(r.status)).length;
  const pct = abs.length ? Math.round(hadir/abs.length*100) : 0;
  el('kpis').innerHTML = [
    {l:'Kunjungan',  v:c('kunjungan').length,                s:'area hari ini'},
    {l:'Mesin',      v:c('mesin').length,                    s:c('mesin').filter(r=>r.status==='Selesai').length+' selesai'},
    {l:'Komplain',   v:c('komplain').filter(r=>r.status!=='Closed').length, s:'belum ditutup'},
    {l:'Kehadiran',  v:pct+'%',                              s:hadir+'/'+abs.length+' personil'},
    {l:'Rencana',    v:c('rencana').length,                  s:'tindak lanjut'},
  ].map(x=>`<div class="kpi"><div class="kpi-label">${x.l}</div><div class="kpi-val">${x.v}</div><div class="kpi-sub">${x.s}</div></div>`).join('');
}

function buildTabs(){
  el('tabs').innerHTML = MODULES.map(m=>{
    const n=(DATA[m.key]||[]).length;
    return `<button class="tab ${m.key===activeTab?'active':''}" data-tab="${m.key}">
      ${m.icon} ${m.label} <span class="n">${n}</span></button>`;
  }).join('');
  el('tabs').querySelectorAll('.tab').forEach(b=>b.onclick=()=>{activeTab=b.dataset.tab;render();});
}

function buildPanels(){
  el('panels').innerHTML = MODULES.map(m=>`
    <div class="panel ${m.key===activeTab?'active':''}" data-panel="${m.key}">
      <div class="panel-hd">
        <span class="ic">${m.icon}</span>
        <div><h2>${m.label}</h2><p>${m.desc}</p></div>
      </div>
      <div class="form-area">
        ${m.fields.map(f=>{
          const id=`f_${m.key}_${f.n}`;
          const cls=f.w==='l'?'f wide':'f';
          const inp=f.t==='select'
            ?`<select id="${id}">${f.opt.map(o=>`<option>${o}</option>`).join('')}</select>`
            :`<input id="${id}" type="${f.t}" placeholder="${f.ph||''}">`;
          return `<div class="${cls}"><label>${f.l}</label>${inp}</div>`;
        }).join('')}
        <div class="form-footer"><button class="btn-add" data-add="${m.key}">+ Tambah</button></div>
      </div>
      ${rowsHtml(m)}
    </div>`).join('');

  el('panels').querySelectorAll('[data-add]').forEach(b=>b.onclick=()=>addRow(b.dataset.add));
  el('panels').querySelectorAll('.del').forEach(b=>b.onclick=()=>delRow(b.dataset.mod,+b.dataset.i));
}

function rowsHtml(m){
  const rows=DATA[m.key]||[];
  if(!rows.length) return `<div class="empty">Belum ada data · klik "+ Tambah" untuk mulai</div>`;
  const head=m.fields.map(f=>`<th>${f.l}</th>`).join('')+'<th></th>';
  const body=rows.map((r,i)=>{
    const tds=m.fields.map(f=>{
      const v=r[f.n]??'';
      if((f.n==='status'||f.n==='prioritas')&&v) return `<td><span class="pill ${PILL[v]||'pn'}">${esc(v)}</span></td>`;
      if(f.t==='number') return `<td class="num">${esc(v)}</td>`;
      return `<td>${esc(v)}</td>`;
    }).join('');
    return `<tr>${tds}<td><button class="del" data-mod="${m.key}" data-i="${i}">✕</button></td></tr>`;
  }).join('');
  return `<div class="tbl-wrap"><table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`;
}

async function addRow(key){
  const m=MODULES.find(x=>x.key===key);
  const row={}; let filled=false;
  m.fields.forEach(f=>{ const v=el(`f_${key}_${f.n}`).value.trim(); row[f.n]=v; if(v) filled=true; });
  if(!filled){ alert('Isi minimal satu kolom.'); return; }
  DATA[key].push(row); await save();
}
async function delRow(key,i){
  if(!confirm('Hapus baris ini?')) return;
  DATA[key].splice(i,1); await save();
}

/* ── CSV ── */
function exportCsv(){
  let out=[`Laporan Harian;${currentDate}`,`Admin;${META.admin};Area;${META.area}`,''];
  MODULES.forEach(m=>{
    const rows=DATA[m.key]||[]; if(!rows.length) return;
    out.push(m.label.toUpperCase());
    out.push(m.fields.map(f=>f.l).join(';'));
    rows.forEach(r=>out.push(m.fields.map(f=>`"${String(r[f.n]??'').replace(/"/g,'""')}"`).join(';')));
    out.push('');
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['﻿'+out.join('\n')],{type:'text/csv;charset=utf-8;'}));
  a.download=`Laporan_${currentDate}.csv`; a.click();
}

/* ── INIT ── */
function initApp(){
  el('tgl').value=currentDate;
  listenDay(currentDate);
  el('tgl').onchange  = e=>{ currentDate=e.target.value; listenDay(currentDate); };
  el('admin').oninput = e=>{ META.admin=e.target.value; save(); };
  el('area').oninput  = e=>{ META.area=e.target.value; save(); };
  el('btnCetak').onclick = ()=>window.print();
  el('btnCsv').onclick   = exportCsv;
}

})();
</script>
