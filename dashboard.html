<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Laporan Harian Operasional — BSI Pro</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

    :root{
      --blue:#123A6B; --blue-700:#0E2E55; --blue-50:#EAF1FB;
      --gold:#C9A227; --gold-soft:#F6EFD8;
      --red:#B5322B; --red-soft:#FBEAE8;
      --green:#1E7A52; --green-soft:#E3F3EB;
      --amber:#B97309; --amber-soft:#FBF0DC;
      --ink:#1A2230; --muted:#69748A; --line:#E3E8F0;
      --bg:#F4F6FA; --card:#FFFFFF;
      --shadow:0 1px 2px rgba(18,58,107,.05), 0 8px 24px rgba(18,58,107,.06);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink);}
    h1,h2,h3{font-family:'Sora',sans-serif;}

    /* ===== LOGIN ===== */
    #loginScreen{
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:
        radial-gradient(1200px 400px at 100% -10%, rgba(201,162,39,.10), transparent 60%),
        radial-gradient(900px 380px at -10% 0%, rgba(18,58,107,.10), transparent 55%),
        var(--bg);
    }
    .login-card{
      background:#fff;border-radius:24px;padding:40px 36px;width:100%;max-width:400px;
      box-shadow:0 4px 6px rgba(18,58,107,.05),0 20px 60px rgba(18,58,107,.12);
      border:1px solid var(--line);
    }
    .login-logo{
      width:64px;height:64px;border-radius:18px;margin:0 auto 20px;
      background:linear-gradient(135deg,var(--gold),#9c7c12);
      display:grid;place-items:center;font-family:'Sora';font-weight:800;font-size:24px;color:#1a1303;
    }
    .login-card h2{text-align:center;font-size:20px;font-weight:800;margin-bottom:4px;}
    .login-card .sub{text-align:center;font-size:13px;color:var(--muted);margin-bottom:28px;}
    .login-fld{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
    .login-fld label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);}
    .login-fld input{
      border:1px solid var(--line);border-radius:11px;padding:11px 14px;
      font-family:inherit;font-size:14px;color:var(--ink);transition:.15s;width:100%;
    }
    .login-fld input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-50);}
    .btn-login{
      width:100%;background:linear-gradient(135deg,var(--blue),var(--blue-700));
      color:#fff;border:none;border-radius:11px;padding:13px;
      font-family:'Sora';font-weight:700;font-size:14px;cursor:pointer;margin-top:8px;transition:.15s;
    }
    .btn-login:hover{filter:brightness(1.1);}
    .btn-login:disabled{opacity:.6;cursor:not-allowed;}
    .login-err{
      background:var(--red-soft);color:var(--red);border-radius:10px;
      padding:10px 14px;font-size:13px;margin-top:12px;display:none;text-align:center;
    }
    .login-load{text-align:center;color:var(--muted);font-size:13px;margin-top:12px;display:none;}

    /* ===== APP ===== */
    .app{
      background:
        radial-gradient(1200px 400px at 100% -10%, rgba(201,162,39,.07), transparent 60%),
        radial-gradient(900px 380px at -10% 0%, rgba(18,58,107,.06), transparent 55%),
        var(--bg);
      min-height:100vh;
      padding:22px clamp(14px,3vw,34px) 60px;
      display:none;
    }

    /* TOPBAR */
    .topbar{
      display:flex;align-items:center;gap:16px;flex-wrap:wrap;
      background:linear-gradient(120deg,var(--blue) 0%,var(--blue-700) 70%);
      color:#fff;border-radius:18px;padding:18px 22px;
      box-shadow:var(--shadow);position:relative;overflow:hidden;
    }
    .topbar::after{content:"";position:absolute;right:-40px;top:-60px;width:220px;height:220px;
      background:radial-gradient(circle,rgba(201,162,39,.35),transparent 65%);}
    .logo{
      width:54px;height:54px;border-radius:14px;flex:0 0 auto;
      background:linear-gradient(135deg,var(--gold),#9c7c12);
      display:grid;place-items:center;font-family:'Sora';font-weight:800;font-size:20px;color:#1a1303;
      box-shadow:inset 0 0 0 2px rgba(255,255,255,.25);
    }
    .brand h1{font-size:clamp(18px,2.4vw,23px);font-weight:800;letter-spacing:.2px;line-height:1.15;}
    .brand .tag{margin-top:3px;font-size:11px;letter-spacing:2.5px;font-weight:600;color:var(--gold-soft);text-transform:uppercase;}
    .header-meta{margin-left:auto;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
    .field-light{display:flex;flex-direction:column;gap:4px;}
    .field-light label{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,.7);font-weight:600;}
    .field-light input{
      background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;
      border-radius:10px;padding:8px 11px;font-family:inherit;font-size:13.5px;min-width:150px;
    }
    .field-light input::placeholder{color:rgba(255,255,255,.55);}
    .field-light input:focus{outline:none;border-color:var(--gold);background:rgba(255,255,255,.2);}

    .user-badge{
      background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);
      border-radius:10px;padding:7px 12px;font-size:12px;color:#fff;
      display:flex;align-items:center;gap:6px;white-space:nowrap;
    }

    .actions{display:flex;gap:8px;margin-left:4px;}
    .btn{font-family:'Sora';font-weight:600;font-size:12.5px;border:none;cursor:pointer;border-radius:10px;
      padding:9px 13px;display:inline-flex;align-items:center;gap:6px;transition:.15s;}
    .btn-gold{background:var(--gold);color:#1a1303;}
    .btn-gold:hover{filter:brightness(1.06);}
    .btn-ghost{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.3);}
    .btn-ghost:hover{background:rgba(255,255,255,.24);}
    .btn-danger{background:rgba(181,50,43,.6);color:#fff;border:1px solid rgba(255,255,255,.2);}
    .btn-danger:hover{background:var(--red);}

    /* SYNC BAR */
    .sync-bar{
      display:flex;align-items:center;gap:8px;padding:8px 14px;
      background:var(--green-soft);border-radius:10px;font-size:12px;
      color:var(--green);font-weight:600;margin:12px 0 0;
      border:1px solid rgba(30,122,82,.15);transition:.3s;
    }
    .sync-bar.syncing{background:var(--amber-soft);color:var(--amber);border-color:rgba(185,115,9,.15);}
    .sync-dot{width:8px;height:8px;border-radius:50%;background:currentColor;flex:0 0 auto;}
    .sync-bar.syncing .sync-dot{animation:pulse 1.2s infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.2;}}

    /* KPI */
    .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin:18px 0;}
    .kpi{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:14px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
    .kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--blue);}
    .kpi.k-gold::before{background:var(--gold);}.kpi.k-red::before{background:var(--red);}
    .kpi.k-green::before{background:var(--green);}.kpi.k-amber::before{background:var(--amber);}
    .kpi .lbl{font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);font-weight:600;}
    .kpi .val{font-family:'Sora';font-weight:800;font-size:28px;line-height:1;margin-top:7px;}
    .kpi .sub{font-size:11.5px;color:var(--muted);margin-top:5px;}

    /* TABS */
    .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
    .tab{font-family:'Sora';font-weight:600;font-size:13px;border:1px solid var(--line);background:#fff;color:var(--muted);
      padding:9px 14px;border-radius:11px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:7px;}
    .tab .dot{width:8px;height:8px;border-radius:50%;background:var(--gold);}
    .tab:hover{border-color:var(--blue);color:var(--blue);}
    .tab.active{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:var(--shadow);}
    .tab.active .dot{background:var(--gold);}
    .tab .count{background:var(--blue-50);color:var(--blue);font-size:11px;border-radius:20px;padding:1px 7px;font-weight:700;}
    .tab.active .count{background:rgba(255,255,255,.2);color:#fff;}

    /* PANEL */
    .panel{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);overflow:hidden;display:none;}
    .panel.active{display:block;animation:fade .25s ease;}
    @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    .panel-head{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;
      background:linear-gradient(180deg,#fbfcfe,#fff);}
    .panel-head .ic{width:38px;height:38px;border-radius:11px;background:var(--blue-50);
      display:grid;place-items:center;font-size:19px;flex:0 0 auto;}
    .panel-head h2{font-size:16px;font-weight:700;}
    .panel-head p{margin-top:2px;font-size:12.5px;color:var(--muted);}

    .form-grid{display:grid;gap:11px;padding:18px 20px;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));align-items:end;}
    .fld{display:flex;flex-direction:column;gap:5px;}
    .fld label{font-size:11px;font-weight:600;letter-spacing:.4px;color:var(--muted);text-transform:uppercase;}
    .fld input,.fld select,.fld textarea{
      border:1px solid var(--line);border-radius:10px;padding:9px 11px;
      font-family:inherit;font-size:13.5px;color:var(--ink);background:#fff;width:100%;}
    .fld textarea{resize:vertical;min-height:38px;}
    .fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-50);}
    .fld.wide{grid-column:1/-1;}
    .add-row{grid-column:1/-1;display:flex;justify-content:flex-end;}
    .btn-add{background:var(--blue);color:#fff;font-family:'Sora';font-weight:600;font-size:13px;
      border:none;border-radius:10px;padding:10px 18px;cursor:pointer;transition:.15s;}
    .btn-add:hover{background:var(--blue-700);}

    .table-wrap{overflow-x:auto;padding:0 8px 12px;}
    table{width:100%;border-collapse:collapse;font-size:13px;min-width:560px;}
    thead th{text-align:left;font-family:'Sora';font-weight:600;font-size:11px;letter-spacing:.7px;
      text-transform:uppercase;color:var(--muted);padding:10px 12px;border-bottom:2px solid var(--line);white-space:nowrap;}
    tbody td{padding:11px 12px;border-bottom:1px solid #EEF1F6;vertical-align:top;}
    tbody tr:hover{background:#FAFBFD;}
    tbody td.num{font-variant-numeric:tabular-nums;font-weight:600;}
    .empty{padding:30px;text-align:center;color:var(--muted);font-size:13.5px;}

    .pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;font-family:'Sora';white-space:nowrap;}
    .p-green{background:var(--green-soft);color:var(--green);}
    .p-amber{background:var(--amber-soft);color:var(--amber);}
    .p-red{background:var(--red-soft);color:var(--red);}
    .p-blue{background:var(--blue-50);color:var(--blue);}
    .p-gray{background:#EEF1F6;color:var(--muted);}

    .del{border:none;background:var(--red-soft);color:var(--red);width:28px;height:28px;
      border-radius:8px;cursor:pointer;font-size:14px;line-height:1;transition:.15s;}
    .del:hover{background:var(--red);color:#fff;}

    .foot{margin-top:18px;text-align:center;color:var(--muted);font-size:11.5px;}
    .foot b{color:var(--blue);}

    @media print{
      #loginScreen{display:none!important;}
      .app{background:#fff;padding:0;display:block!important;}
      .tabs,.form-grid,.actions,.del,.sync-bar,.foot{display:none!important;}
      .panel{display:block!important;page-break-inside:avoid;border:1px solid #ccc;margin-bottom:14px;box-shadow:none;}
      .topbar{background:var(--blue)!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    }
  </style>
</head>
<body>

<!-- ===== HALAMAN LOGIN ===== -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">BSI</div>
    <h2>Selamat Datang</h2>
    <p class="sub">Dashboard Laporan Harian Operasional<br><b>PT. Bangun Sinar Indonesia</b></p>
    <div class="login-fld">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="email@perusahaan.com" autocomplete="email">
    </div>
    <div class="login-fld">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-login" id="btnLogin">Masuk ke Dashboard</button>
    <div class="login-err" id="loginErr"></div>
    <div class="login-load" id="loginLoad">⏳ Sedang masuk...</div>
  </div>
</div>

<!-- ===== DASHBOARD ===== -->
<div class="app" id="appScreen">
  <div class="topbar">
    <div class="logo">BSI</div>
    <div class="brand">
      <h1>Dashboard Laporan Harian Operasional</h1>
      <div class="tag">Facility Service Excellence</div>
    </div>
    <div class="header-meta">
      <div class="field-light">
        <label>Tanggal Laporan</label>
        <input type="date" id="tgl">
      </div>
      <div class="field-light">
        <label>Admin / PIC</label>
        <input type="text" id="admin" placeholder="Nama administrasi">
      </div>
      <div class="field-light">
        <label>Area / Proyek</label>
        <input type="text" id="area" placeholder="Nama site / proyek">
      </div>
      <div class="user-badge">👤 <span id="userEmail">-</span></div>
      <div class="actions">
        <button class="btn btn-ghost" id="btnCetak">🖨 Cetak / PDF</button>
        <button class="btn btn-gold"  id="btnCsv">⬇ Export CSV</button>
        <button class="btn btn-danger" id="btnLogout">🚪 Keluar</button>
      </div>
    </div>
  </div>

  <div class="sync-bar syncing" id="syncBar">
    <span class="sync-dot"></span>
    <span id="syncText">Menghubungkan ke server...</span>
  </div>

  <div class="kpis" id="kpis"></div>
  <div class="tabs" id="tabs"></div>
  <div id="panels"></div>

  <div class="foot">
    Data tersinkron real-time · <b>PT. Bangun Sinar Indonesia</b> — BSI Pro Facility Service
  </div>
</div>

<script>
(function(){
  "use strict";

  /* =====================================================
     🔥 KONFIGURASI FIREBASE
     Ganti nilai di bawah dengan config project Anda.
     Ambil dari: Firebase Console → Project Settings → Your Apps → </> Web
  ===================================================== */
  const firebaseConfig = {
    apiKey:            "AIzaSyCq7KGXAefUfsC1Vf4a1y63Ptfw6zpFx44",
    authDomain:        "bsi-dashboard-c1bcc.firebaseapp.com",
    projectId:         "bsi-dashboard-c1bcc",
    storageBucket:     "bsi-dashboard-c1bcc.firebasestorage.app",
    messagingSenderId: "953786612796",
    appId:             "1:953786612796:web:d58d74bda7ec0811065739",
    databaseURL:       "https://bsi-dashboard-c1bcc-default-rtdb.firebaseio.com"
  };
  /* ===================================================== */

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db   = firebase.database();

  /* ---------- DEFINISI MODUL ---------- */
  const MODULES = [
    { key:'operasional', icon:'📋', label:'Kegiatan Operasional',
      desc:'Catatan aktivitas operasional rutin harian',
      fields:[
        {n:'waktu',    l:'Waktu',       t:'time',   w:'s'},
        {n:'kegiatan', l:'Kegiatan',    t:'text',   w:'l', ph:'Uraian kegiatan'},
        {n:'lokasi',   l:'Lokasi',      t:'text',   w:'m'},
        {n:'pic',      l:'PIC',         t:'text',   w:'s'},
        {n:'status',   l:'Status',      t:'select', opt:['Selesai','Proses','Tertunda']},
        {n:'ket',      l:'Keterangan',  t:'text',   w:'l'},
      ]},
    { key:'kunjungan', icon:'📍', label:'Kunjungan Area',
      desc:'Hasil kunjungan & inspeksi area/site',
      fields:[
        {n:'waktu',    l:'Waktu',            t:'time',   w:'s'},
        {n:'lokasi',   l:'Lokasi / Area',    t:'text',   w:'m'},
        {n:'pic',      l:'Petugas',          t:'text',   w:'s'},
        {n:'temuan',   l:'Temuan / Catatan', t:'text',   w:'l'},
        {n:'tindakan', l:'Tindak Lanjut',    t:'text',   w:'l'},
        {n:'status',   l:'Kondisi',          t:'select', opt:['Baik','Perlu Perbaikan','Kritis']},
      ]},
    { key:'mesin', icon:'🔧', label:'Perbaikan Mesin',
      desc:'Pemeliharaan & perbaikan peralatan/mesin',
      fields:[
        {n:'mesin',     l:'Mesin / Alat',    t:'text',   w:'m'},
        {n:'lokasi',    l:'Lokasi',          t:'text',   w:'s'},
        {n:'kerusakan', l:'Jenis Kerusakan', t:'text',   w:'l'},
        {n:'tindakan',  l:'Tindakan',        t:'text',   w:'l'},
        {n:'teknisi',   l:'Teknisi',         t:'text',   w:'s'},
        {n:'status',    l:'Status',          t:'select', opt:['Selesai','Proses','Menunggu Sparepart','Pending']},
      ]},
    { key:'inventaris', icon:'📦', label:'Inventaris',
      desc:'Mutasi stok barang & material',
      fields:[
        {n:'item',     l:'Nama Item',  t:'text',   w:'m'},
        {n:'kategori', l:'Kategori',   t:'select', opt:['Chemical','Consumable','Alat','Spare Part','APD','Lainnya']},
        {n:'masuk',    l:'Masuk',      t:'number', w:'s'},
        {n:'keluar',   l:'Keluar',     t:'number', w:'s'},

        {n:'satuan',   l:'Satuan',     t:'text',   w:'s', ph:'pcs/ltr/box'},
      ]},
    { key:'absensi', icon:'🕒', label:'Rekap Absensi',
      desc:'Kehadiran personil harian',
      fields:[
        {n:'nama',    l:'Nama',            t:'text',   w:'m'},
        {n:'jabatan', l:'Jabatan / Posisi', t:'text',   w:'m'},
        {n:'masuk',   l:'Jam Masuk',       t:'time',   w:'s'},
        {n:'pulang',  l:'Jam Pulang',      t:'time',   w:'s'},
        {n:'status',  l:'Status',          t:'select', opt:['Hadir','Terlambat','Izin','Sakit','Cuti','Alpha']},
        {n:'ket',     l:'Keterangan',      t:'text',   w:'m'},
      ]},
    { key:'komplain', icon:'⚠️', label:'Komplain',
      desc:'Keluhan klien / pengguna area',
      fields:[
        {n:'waktu',      l:'Waktu',              t:'time',   w:'s'},
        {n:'pelapor',    l:'Pelapor / Area',      t:'text',   w:'m'},
        {n:'kategori',   l:'Kategori',            t:'select', opt:['Kebersihan','Maintenance','SDM','Keamanan','Lainnya']},
        {n:'deskripsi',  l:'Deskripsi Komplain',  t:'text',   w:'l'},
        {n:'penanganan', l:'Penanganan',          t:'text',   w:'l'},
        {n:'status',     l:'Status',             t:'select', opt:['Open','Proses','Closed']},
      ]},
    { key:'nonreguler', icon:'✨', label:'Kegiatan Non Reguler',
      desc:'Aktivitas insidental / di luar jadwal rutin',
      fields:[
        {n:'waktu',    l:'Waktu',      t:'time', w:'s'},
        {n:'kegiatan', l:'Kegiatan',   t:'text', w:'l'},
        {n:'lokasi',   l:'Lokasi',     t:'text', w:'m'},
        {n:'pic',      l:'PIC',        t:'text', w:'s'},
        {n:'ket',      l:'Keterangan', t:'text', w:'l'},
      ]},
    { key:'rencana', icon:'🎯', label:'Rencana Kerja',
      desc:'Rencana tindak lanjut & target ke depan',
      fields:[
        {n:'target',    l:'Tgl Target',        t:'date',   w:'s'},
        {n:'kegiatan',  l:'Rencana Kegiatan',  t:'text',   w:'l'},
        {n:'pic',       l:'PIC',               t:'text',   w:'s'},
        {n:'prioritas', l:'Prioritas',         t:'select', opt:['Tinggi','Sedang','Rendah']},
        {n:'status',    l:'Status',            t:'select', opt:['Belum Mulai','Berjalan','Selesai']},
        {n:'ket',       l:'Keterangan',        t:'text',   w:'l'},
      ]},
  ];

  const PILL = {
    'Selesai':'p-green','Closed':'p-green','Baik':'p-green','Hadir':'p-green','Berjalan':'p-blue',
    'Proses':'p-amber','Terlambat':'p-amber','Perlu Perbaikan':'p-amber','Menunggu Sparepart':'p-amber','Open':'p-amber','Belum Mulai':'p-gray',
    'Tertunda':'p-red','Pending':'p-red','Kritis':'p-red','Alpha':'p-red','Tinggi':'p-red',
    'Izin':'p-blue','Cuti':'p-blue','Sakit':'p-amber','Sedang':'p-amber','Rendah':'p-gray','Lainnya':'p-gray',
  };

  /* ---------- STATE ---------- */
  let DATA = {};
  let META = {admin:'', area:''};
  let activeTab  = MODULES[0].key;
  let currentDate = new Date().toISOString().slice(0,10);
  let unsubscribe = null;

  const el  = id => document.getElementById(id);
  const esc = s  => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

  /* ---------- AUTH ---------- */
  auth.onAuthStateChanged(user => {
    if(user){
      el('loginScreen').style.display = 'none';
      el('appScreen').style.display   = 'block';
      el('userEmail').textContent      = user.email;
      initApp();
    } else {
      el('loginScreen').style.display = 'flex';
      el('appScreen').style.display   = 'none';
      if(unsubscribe){ unsubscribe(); unsubscribe = null; }
    }
  });

  el('btnLogin').onclick = async () => {
    const email = el('loginEmail').value.trim();
    const pass  = el('loginPass').value;
    if(!email || !pass){ showErr('Email dan password wajib diisi.'); return; }
    el('loginErr').style.display  = 'none';
    el('loginLoad').style.display = 'block';
    el('btnLogin').disabled       = true;
    try{
      await auth.signInWithEmailAndPassword(email, pass);
    } catch(e){
      showErr(pesanError(e.code));
      el('loginLoad').style.display = 'none';
      el('btnLogin').disabled       = false;
    }
  };

  el('loginPass').addEventListener('keydown', e => { if(e.key==='Enter') el('btnLogin').click(); });

  el('btnLogout').onclick = () => { if(confirm('Yakin ingin keluar?')) auth.signOut(); };

  function showErr(msg){ el('loginErr').textContent = msg; el('loginErr').style.display = 'block'; }

  function pesanError(code){
    const m = {
      'auth/user-not-found':    'Email tidak ditemukan.',
      'auth/wrong-password':    'Password salah.',
      'auth/invalid-email':     'Format email tidak valid.',
      'auth/too-many-requests': 'Terlalu banyak percobaan. Coba lagi nanti.',
      'auth/invalid-credential':'Email atau password salah.',
    };
    return m[code] || 'Login gagal. Periksa email & password Anda.';
  }

  /* ---------- REALTIME DATABASE ---------- */
  const refFor = d => db.ref('laporan/' + d.replace(/-/g, '_'));

  function listenDay(d){
    if(unsubscribe){ unsubscribe(); }
    setSyncing(true);
    const r = refFor(d);
    const handler = snap => {
      const o = snap.val();
      if(o){
        DATA = o.data || {};
        META = o.meta || {admin:'', area:''};
      } else {
        DATA = {}; META = {admin:'', area:''};
      }
      MODULES.forEach(m => { if(!Array.isArray(DATA[m.key])) DATA[m.key]=[]; });
      el('admin').value = META.admin || '';
      el('area').value  = META.area  || '';
      setSynced();
      render();
    };
    r.on('value', handler, err => {
      console.error(err);
      el('syncBar').className    = 'sync-bar syncing';
      el('syncText').textContent = '⚠️ Gagal terhubung ke server. Periksa koneksi.';
    });
    unsubscribe = () => r.off('value', handler);
  }

  async function saveDay(){
    setSyncing(true);
    try{
      await refFor(currentDate).set({ data: DATA, meta: META });
    } catch(e){
      console.error('Gagal simpan:', e);
      alert('Gagal menyimpan data. Periksa koneksi internet.');
    }
  }

  function setSyncing(){ el('syncBar').className='sync-bar syncing'; el('syncText').textContent='🔄 Menyinkronkan...'; }
  function setSynced(){
    el('syncBar').className = 'sync-bar';
    const jam = new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    el('syncText').textContent = `✅ Data tersinkron — ${jam}`;
  }

  /* ---------- RENDER ---------- */
  function buildTabs(){
    el('tabs').innerHTML = MODULES.map(m => {
      const n = (DATA[m.key]||[]).length;
      return `<button class="tab ${m.key===activeTab?'active':''}" data-tab="${m.key}">
        <span class="dot"></span>${m.icon} ${m.label}
        <span class="count">${n}</span></button>`;
    }).join('');
    el('tabs').querySelectorAll('.tab').forEach(b => b.onclick=()=>{ activeTab=b.dataset.tab; render(); });
  }

  function fieldHtml(m, f){
    const id  = `f_${m.key}_${f.n}`;
    const cls = f.w==='l' ? 'fld wide' : 'fld';
    let inner;
    if(f.t==='select'){
      inner = `<select id="${id}">${f.opt.map(o=>`<option>${o}</option>`).join('')}</select>`;
    } else {
      inner = `<input id="${id}" type="${f.t}" placeholder="${f.ph||''}">`;
    }
    return `<div class="${cls}"><label>${f.l}</label>${inner}</div>`;
  }

  function rowsHtml(m){
    const rows = DATA[m.key]||[];
    if(!rows.length) return `<div class="empty">Belum ada data ${m.label.toLowerCase()} untuk tanggal ini.</div>`;
    const head = m.fields.map(f=>`<th>${f.l}</th>`).join('') + '<th></th>';
    const body = rows.map((r,i) => {
      const tds = m.fields.map(f => {
        const v = r[f.n]??'';
        if((f.n==='status'||f.n==='prioritas') && v)
          return `<td><span class="pill ${PILL[v]||'p-gray'}">${esc(v)}</span></td>`;
        if(f.t==='number') return `<td class="num">${esc(v)}</td>`;
        return `<td>${esc(v)}</td>`;
      }).join('');
      return `<tr>${tds}<td><button class="del" data-mod="${m.key}" data-i="${i}" title="Hapus">✕</button></td></tr>`;
    }).join('');
    return `<div class="table-wrap"><table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`;
  }

  function buildPanels(){
    el('panels').innerHTML = MODULES.map(m => `
      <div class="panel ${m.key===activeTab?'active':''}" data-panel="${m.key}">
        <div class="panel-head">
          <div class="ic">${m.icon}</div>
          <div><h2>${m.label}</h2><p>${m.desc}</p></div>
        </div>
        <div class="form-grid">
          ${m.fields.map(f=>fieldHtml(m,f)).join('')}
          <div class="add-row"><button class="btn-add" data-add="${m.key}">+ Tambah Baris</button></div>
        </div>
        ${rowsHtml(m)}
      </div>`).join('');

    el('panels').querySelectorAll('[data-add]').forEach(b => b.onclick=()=>addRow(b.dataset.add));
    el('panels').querySelectorAll('.del').forEach(b => b.onclick=()=>delRow(b.dataset.mod, +b.dataset.i));
  }

  async function addRow(key){
    const m = MODULES.find(x=>x.key===key);
    const row = {};
    let filled = false;
    m.fields.forEach(f => {
      const v = el(`f_${key}_${f.n}`).value.trim();
      row[f.n] = v;
      if(v) filled = true;
    });
    if(!filled){ alert('Isi minimal satu kolom sebelum menambah baris.'); return; }
    DATA[key].push(row);
    await saveDay();
  }

  async function delRow(key, i){
    if(!confirm('Hapus baris ini?')) return;
    DATA[key].splice(i, 1);
    await saveDay();
  }

  /* ---------- KPI ---------- */
  function kpiHtml(){
    const cnt = k => DATA[k]||[];
    const abs  = cnt('absensi');
    const hadir   = abs.filter(r=>['Hadir','Terlambat'].includes(r.status)).length;
    const persen  = abs.length ? Math.round(hadir/abs.length*100) : 0;
    const komplainOpen = cnt('komplain').filter(r=>r.status!=='Closed').length;
    const mesinDone    = cnt('mesin').filter(r=>r.status==='Selesai').length;
    return [
      {l:'Kunjungan Area',   v:cnt('kunjungan').length,   s:'inspeksi hari ini',                c:''},
      {l:'Perbaikan Mesin',  v:cnt('mesin').length,       s:`${mesinDone} selesai`,              c:'k-gold'},
      {l:'Komplain Terbuka', v:komplainOpen,              s:`dari ${cnt('komplain').length} total`, c:'k-red'},
      {l:'Kehadiran',        v:persen+'%',                s:`${hadir}/${abs.length} personil`,   c:'k-green'},
      {l:'Rencana Kerja',    v:cnt('rencana').length,     s:'tindak lanjut',                     c:'k-amber'},
    ].map(x=>`<div class="kpi ${x.c}"><div class="lbl">${x.l}</div><div class="val">${x.v}</div><div class="sub">${x.s}</div></div>`).join('');
  }

  function render(){
    el('kpis').innerHTML = kpiHtml();
    buildTabs();
    buildPanels();
  }

  /* ---------- EXPORT CSV ---------- */
  function exportCsv(){
    let out = [
      `Laporan Harian Operasional;Tanggal:;${currentDate}`,
      `Admin:;${META.admin};Area:;${META.area}`,
      '',
    ];
    MODULES.forEach(m => {
      const rows = DATA[m.key]||[];
      if(!rows.length) return;
      out.push(m.label.toUpperCase());
      out.push(m.fields.map(f=>f.l).join(';'));
      rows.forEach(r => out.push(m.fields.map(f=>`"${String(r[f.n]??'').replace(/"/g,'""')}"`).join(';')));
      out.push('');
    });
    const blob = new Blob(['﻿'+out.join('\n')], {type:'text/csv;charset=utf-8;'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `Laporan_Harian_${currentDate}.csv`;
    a.click();
  }

  /* ---------- INIT ---------- */
  function initApp(){
    el('tgl').value = currentDate;
    listenDay(currentDate);

    el('tgl').onchange   = e => { currentDate = e.target.value; listenDay(currentDate); };
    el('admin').oninput  = e => { META.admin = e.target.value; saveDay(); };
    el('area').oninput   = e => { META.area  = e.target.value; saveDay(); };
    el('btnCetak').onclick = () => window.print();
    el('btnCsv').onclick   = exportCsv;
  }

})();
</script>
</body>
</html>
